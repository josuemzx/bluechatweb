version: '3.8'

services:
  bluechat-db:
    image: postgres:16-alpine
    container_name: bluechat-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      POSTGRES_DB: ${DATABASE_NAME:-strapi}
    volumes:
      - bluechat_db_data:/var/lib/postgresql/data
    # NO exponemos el puerto al host. Solo accesible dentro de la red Docker interna.
    networks:
      - bluechat-network

  bluechat-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bluechat-api
    restart: always
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: bluechat-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      NODE_ENV: production
      STRAPI_URL: https://api.bluechat.lat
    depends_on:
      - bluechat-db
    volumes:
      - bluechat_uploads:/opt/app/public/uploads
    networks:
      - bluechat-network
    # Puerto 1337 del host -> 1337 del container (libre en el VPS)
    ports:
      - "127.0.0.1:1337:1337"

  bluechat-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluechat-web
    restart: always
    environment:
      NEXT_PUBLIC_STRAPI_URL: https://api.bluechat.lat
      PORT: 3000
    networks:
      - bluechat-network
    # Puerto 3002 del host -> 3000 del container (3000 está ocupado por Flowise)
    ports:
      - "127.0.0.1:3002:3000"

networks:
  bluechat-network:
    driver: bridge

volumes:
  bluechat_db_data:
  bluechat_uploads:
