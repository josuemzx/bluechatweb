services:
  bluechat-db:
    image: postgres:16-alpine
    container_name: bluechat-db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - bluechat_db_data:/var/lib/postgresql/data
    networks:
      - bluechat-network

  bluechat-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bluechat-api
    restart: always
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: bluechat-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      NODE_ENV: production
      STRAPI_URL: https://api.bluechat.lat
    depends_on:
      - bluechat-db
    volumes:
      - bluechat_uploads:/opt/app/public/uploads
    networks:
      - bluechat-network
    ports:
      - "127.0.0.1:1337:1337"

  bluechat-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluechat-web
    restart: always
    environment:
      NEXT_PUBLIC_STRAPI_URL: https://api.bluechat.lat
      PORT: 3000
    networks:
      - bluechat-network
    ports:
      - "127.0.0.1:3002:3000"

networks:
  bluechat-network:
    driver: bridge

volumes:
  bluechat_db_data:
  bluechat_uploads:
